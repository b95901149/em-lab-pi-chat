<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="THz 光電實驗室 PI 視角對話引擎 — 公開去識別版" />
  <title>THz Lab PI · 對話</title>
  <link rel="stylesheet" href="css/app.css?v=5" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">λ</div>
        <div>
          <h1>THz 實驗室 PI 視角</h1>
          <p class="subtitle" id="site-subtitle">對話引擎 · 公開去識別版</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="status-pill" class="status-pill" title="連線狀態">載入中</span>
        <button type="button" id="btn-clear" class="btn-ghost">清除對話</button>
        <button type="button" id="btn-panel" class="btn-ghost mobile-only" aria-label="開啟設定">設定</button>
      </div>
    </header>

    <main class="layout">
      <section class="chat-panel" aria-label="對話區">
        <div id="welcome" class="welcome" hidden>
          <blockquote class="motto">
            確認再確認再三確認，聯繫再聯繫再三聯繫。
            <cite>防腦殘小卡</cite>
          </blockquote>
          <p class="welcome-lead">以公開教學與研究風格對話，基於公開資訊推斷，<strong>非本人</strong>。</p>
          <div class="welcome-grid" id="welcome-grid"></div>
        </div>

        <div id="messages" class="messages" role="log" aria-live="polite"></div>
        <div id="refs" class="refs hidden" aria-label="參考來源"></div>

        <form id="chat-form" class="composer">
          <div class="composer-box">
            <textarea
              id="user-input"
              rows="1"
              placeholder="問電磁、THz、研究選題、口試準備…"
              aria-label="輸入訊息"
              required
            ></textarea>
            <button type="submit" id="btn-send" class="btn-send" aria-label="送出">
              <span class="btn-send-label">送出</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h12M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <p class="composer-hint">Enter 送出 · Shift+Enter 換行</p>
          <div id="turnstile-wrap" class="turnstile-wrap hidden"></div>
        </form>
      </section>

      <aside class="side-panel" id="side-panel" aria-label="資訊面板">
        <div class="command-center" id="command-center" aria-label="PI 指揮中心">
          <div class="zordon-stage">
            <div class="zordon-frame">
              <img
                class="zordon-scene"
                src="assets/zordon-base.jpg"
                alt="THz 指揮中心"
                width="1024"
                height="1024"
              />
              <div class="tube-cylinder" aria-hidden="true">
                <img class="pi-holo" src="assets/pi-holo.png" alt="" />
                <div class="crt-fx">
                  <div class="crt-scanlines"></div>
                  <div class="crt-flicker"></div>
                  <div class="crt-roll"></div>
                  <div class="crt-noise"></div>
                </div>
              </div>
              <div class="tube-overlay" aria-hidden="true">
                <div class="tube-beam"></div>
              </div>
              <div class="energy-particles" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span>
              </div>
            </div>
            <p class="zordon-caption">
              <span class="pulse-dot"></span> THz Command Center
            </p>
            <p class="zordon-sub">全息諮詢連線中</p>
          </div>
        </div>

        <div class="panel-section panel-highlight">
          <h2>三思模式</h2>
          <label class="toggle-row">
            <div>
              <span class="toggle-label">任務先出 Checklist</span>
              <p id="sansha-hint" class="hint">純知識題可直接答；準備、口試、量測類會先列清單。</p>
            </div>
            <input type="checkbox" id="sansha-toggle" />
            <span class="toggle-ui" aria-hidden="true"></span>
          </label>
          <div id="sansha-badge" class="badge hidden">三思模式 ON</div>
        </div>

        <div class="panel-section">
          <h2>快速提問</h2>
          <div class="quick-btns">
            <button type="button" class="quick-btn" data-q="太赫茲在頻譜上站哪裡？適合做什麼研究？">
              <span class="quick-tag">頻譜</span> THz 研究定位
            </button>
            <button type="button" class="quick-btn" data-q="我想做 300 GHz 天線研究，該從哪裡開始？">
              <span class="quick-tag">天線</span> 300 GHz 入門
            </button>
            <button type="button" class="quick-btn" data-q="4f 系統為什麼能做空間頻率濾波？">
              <span class="quick-tag">光學</span> 4f 系統原理
            </button>
            <button type="button" class="quick-btn" data-q="下個月口試，有哪些要注意？">
              <span class="quick-tag">口試</span> 口試準備
            </button>
            <button type="button" class="quick-btn" data-q="明天要跟老師量天線，今天該準備什麼？">
              <span class="quick-tag">量測</span> 量測 checklist
            </button>
            <button type="button" class="quick-btn" data-q="電磁波會致癌嗎？如何用數據討論？">
              <span class="quick-tag">科普</span> 電磁波安全
            </button>
          </div>
        </div>

        <div class="panel-section footer-note">
          <p class="hint small">去識別化：不輸出真實人名與薪資。Lab 成員稱「你們某某學長」。</p>
        </div>
      </aside>
    </main>
  </div>

  <div id="overlay" class="overlay hidden" aria-hidden="true"></div>
  <script>
    (function () {
      function basePath() {
        var p = location.pathname;
        if (p.endsWith("/")) return p;
        var i = p.lastIndexOf("/");
        return i >= 0 ? p.slice(0, i + 1) : "/";
      }
      function setPill(text, state) {
        var pill = document.getElementById("status-pill");
        if (!pill) return;
        pill.textContent = text;
        pill.classList.remove("ready", "error");
        if (state === "ready") pill.classList.add("ready");
        if (state === "error") pill.classList.add("error");
      }
      window.__setStatusPill = setPill;

      function bootStatus() {
        if (location.protocol === "file:") {
          setPill("請用 http:// 開啟", "error");
          return;
        }
        setPill("啟動中…", null);
        var base = basePath();
        fetch(base + "config.json")
          .then(function (r) {
            if (!r.ok) throw new Error("config");
            return r.json();
          })
          .then(function (cfg) {
            var api = (cfg.apiUrl || "").replace(/\/v1\/chat\/?$/i, "/health");
            return fetch(api).then(function (r) {
              if (!r.ok) throw new Error("health");
              return r.json();
            });
          })
          .then(function (data) {
            setPill((data.provider || "API").toUpperCase() + " 就緒", "ready");
          })
          .catch(function (err) {
            console.warn("status boot failed", err);
            setPill("API 離線", "error");
          });
      }

      function guardForm() {
        var f = document.getElementById("chat-form");
        if (!f || f.__chatGuard) return;
        f.__chatGuard = true;
        f.addEventListener("submit", function (e) {
          e.preventDefault();
        });
      }

      function onReady() {
        guardForm();
        bootStatus();
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", onReady);
      } else {
        onReady();
      }
    })();
  </script>
  <script type="module" src="js/app.js?v=14"></script>
</body>
</html>
